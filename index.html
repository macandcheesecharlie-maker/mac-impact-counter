<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body {
  width: 100%;
  max-width: 100%;
  margin: 0;
  padding: 0;
  background: #EB6409;
  overflow-x: hidden;
}

* {
  box-sizing: border-box;
}

body {
  text-align: center;
  padding: 10px 8px;
}

.counter {
  margin: 22px 0;
}

.number {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(40px, 8vw, 76px);
  font-weight: 300;
  color: #FFFFFF;
  line-height: 1;
  white-space: nowrap;
}

.label {
  font-family: 'Comfortaa', sans-serif;
  font-size: clamp(13px, 2vw, 20px);
  font-weight: 600;
  color: #FFFFFF;
  line-height: 1.25;
  margin-top: 12px;
}

@media (max-width: 600px) {
  body {
    padding: 6px 4px;
  }

  .counter {
    margin: 14px 0;
  }

  .number {
    font-size: clamp(31px, 10vw, 42px);
  }

  .label {
    font-size: 13px;
    margin-top: 8px;
  }
}
</style>
</head>

<body>

<div class="counter">
  <div class="number" data-target="103480">0</div>
  <div class="label">Total Servings / Meals Donated</div>
</div>

<div class="counter">
  <div class="number" data-target="26000">0</div>
  <div class="label">Total Boxes Donated</div>
</div>

<div class="counter">
  <div class="number" data-target="28198300">0</div>
  <div class="label">Total Noodles Donated</div>
</div>

<script>
window.addEventListener('load', function () {
  var counters = document.querySelectorAll('.number');

  for (var i = 0; i < counters.length; i++) {
    startCounter(counters[i]);
  }

  function startCounter(counter) {
    var target = parseInt(counter.getAttribute('data-target'), 10);
    var current = 0;
    var steps = 100;
    var increment = Math.ceil(target / steps);

    var timer = setInterval(function () {
      current += increment;

      if (current >= target) {
        current = target;
        clearInterval(timer);
      }

      counter.textContent = current.toLocaleString();
    }, 20);
  }
});
</script>

</body>
</html>
