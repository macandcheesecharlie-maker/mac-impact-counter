<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
html, body {
  width: 100%;
  max-width: 100%;
  margin: 0;
  padding: 0;
  background: #EB6409;
  overflow-x: hidden;
}

* {
  box-sizing: border-box;
}

body {
  text-align: center;
  padding: 10px 8px;
}

#impact-counter-widget {
  width: 100%;
  max-width: 100%;
  margin: 0 auto;
}

.counter {
  margin: 22px 0;
}

.number {
  font-family: 'Outfit', sans-serif;
  font-size: clamp(40px, 8vw, 76px);
  font-weight: 300;
  color: #FFFFFF;
  line-height: 1;
  white-space: nowrap;
}

.label {
  font-family: 'Comfortaa', sans-serif;
  font-size: clamp(13px, 2vw, 20px);
  font-weight: 600;
  color: #FFFFFF;
  line-height: 1.25;
  margin-top: 12px;
}

@media (max-width: 600px) {
  body {
    padding-top: 0;
    padding-bottom: 0;
    padding-left: 8px;
    padding-right: 8px;
  }

  .counter {
    margin: 14px 0;
  }

  .counter:first-child {
    margin-top: 0;
  }

  .counter:last-child {
    margin-bottom: 0;
  }

  .number {
    font-size: clamp(31px, 10vw, 42px);
  }

  .label {
    font-size: 13px;
    margin-top: 8px;
  }
}
</style>
</head>

<body>

<div id="impact-counter-widget">

  <div class="counter">
    <div class="number" data-target="103480">0</div>
    <div class="label">Total Servings / Meals Donated</div>
  </div>

  <div class="counter">
    <div class="number" data-target="26000">0</div>
    <div class="label">Total Boxes Donated</div>
  </div>

  <div class="counter">
    <div class="number" data-target="28198300">0</div>
    <div class="label">Total Noodles Donated</div>
  </div>

</div>

<script>
(function () {
  var hasStarted = false;

  function animateCounter(counter) {
    var target = parseInt(counter.getAttribute('data-target'), 10);
    var duration = 1400;
    var startTime = null;

    function updateCounter(timestamp) {
      if (!startTime) {
        startTime = timestamp;
      }

      var progress = Math.min((timestamp - startTime) / duration, 1);
      var easedProgress = 1 - Math.pow(1 - progress, 3);
      var current = Math.floor(easedProgress * target);

      counter.textContent = current.toLocaleString();

      if (progress < 1) {
        requestAnimationFrame(updateCounter);
      } else {
        counter.textContent = target.toLocaleString();
      }
    }

    requestAnimationFrame(updateCounter);
  }

  function startCounters() {
    if (hasStarted) {
      return;
    }

    hasStarted = true;

    var counters = document.querySelectorAll('.number');

    for (var i = 0; i < counters.length; i++) {
      animateCounter(counters[i]);
    }
  }

  function setupVisibilityTrigger() {
    var widget = document.getElementById('impact-counter-widget');

    if (!widget) {
      return;
    }

    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function (entries) {
        var entry = entries[0];

        if (entry.isIntersecting && entry.intersectionRatio >= 0.65) {
          startCounters();
          observer.disconnect();
        }
      }, {
        threshold: [0, 0.25, 0.5, 0.65, 0.75, 1]
      });

      observer.observe(widget);
    } else {
      startCounters();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setupVisibilityTrigger);
  } else {
    setupVisibilityTrigger();
  }
})();
</script>

</body>
</html>
