<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body{
  text-align:center;
  background:#transparent;
  margin:0;
  padding:20px;
}

.counter{
  margin:30px 0;
}

.number{
  font-family:'Outfit', sans-serif;
  font-size:80px;
  font-weight:600;
  color:#FFFFFF;
}

.label{
  font-family:'Comfortaa', sans-serif;
  font-size:20px;
  font-weight:600;
  color:#FFFFFF;
}

</style>
</head>
<body>

<div class="counter">
  <div class="number" data-target="103480">0</div>
  <div class="label">Total Servings / Meals Donated</div>
</div>

<div class="counter">
  <div class="number" data-target="26000">0</div>
  <div class="label">Total Boxes Donated</div>
</div>

<div class="counter">
  <div class="number" data-target="28198300">0</div>
  <div class="label">Total Noodles Donated</div>
</div>

<script>
const counters = document.querySelectorAll('.number');

counters.forEach(counter => {
  const target = +counter.getAttribute('data-target');
  let current = 0;

  const update = () => {
    const increment = target / 100;

    if(current < target){
      current += increment;
      counter.innerText =
        Math.floor(current).toLocaleString();
      requestAnimationFrame(update);
    } else {
      counter.innerText =
        target.toLocaleString();
    }
  };

  update();
});
</script>

</body>
</html>
